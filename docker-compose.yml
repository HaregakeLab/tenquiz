services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      php:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # php コンテナの entrypoint が nginx.conf を生成するのを待つ
        echo "nginx.conf の生成を待機中..."
        while [ ! -f /var/www/html/docker/nginx.conf ]; do sleep 1; done
        echo "nginx.conf 検出、起動します"
        cp /var/www/html/docker/nginx.conf /etc/nginx/conf.d/default.conf
        nginx -g 'daemon off;'

  php:
    build: .
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    working_dir: /var/www/html
